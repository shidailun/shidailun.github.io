<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gluban Translate</title>
<style>
  :root { color-scheme: light dark; }
  html,body { height:100%; margin:0; }
  body {
    font-family: -apple-system, "Segoe UI", "Microsoft JhengHei", "PingFang TC", sans-serif;
    background: #14361f; color: #f2efe6;
    display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px;
  }
  .card {
    max-width: 420px; width:100%; text-align:center;
    background: rgba(0,0,0,0.25); border:1px solid rgba(255,255,255,0.12);
    border-radius:18px; padding:32px 26px; backdrop-filter: blur(4px);
  }
  h1 { margin:0 0 6px; font-size:1.6rem; letter-spacing:.5px; }
  .sub { margin:0 0 22px; font-size:.85rem; opacity:.6; }
  .spinner {
    width:34px; height:34px; margin:6px auto 18px;
    border:3px solid rgba(255,255,255,.2); border-top-color:#8fd19e;
    border-radius:50%; animation:spin .9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #msg { font-size:1.02rem; line-height:1.6; margin:0 0 18px; }
  button {
    font: inherit; font-size:1rem; color:#14361f; background:#8fd19e;
    border:0; border-radius:10px; padding:11px 22px; cursor:pointer; font-weight:600;
  }
  button:hover { background:#a3dcb0; }
  .hidden { display:none !important; }
</style>
</head>
<body>
  <div class="card">
    <h1>Gluban Translate</h1>
    <p class="sub">賽德克語翻譯 · Seediq ⇄ 中文 / English</p>
    <div id="spinner" class="spinner"></div>
    <p id="msg">正在尋找伺服器…</p>
    <button id="retry" class="hidden" onclick="go()">重新嘗試</button>
  </div>
<script>
  // Launcher: prefer the PC (fast, GPU) via its current tunnel, published to the
  // gist that the phone app also reads. If the PC is unreachable (asleep/offline),
  // fall back to the always-on public Hugging Face Space. This page's address
  // never changes; the targets behind it can come and go.
  var GIST  = 'https://gist.githubusercontent.com/shidailun/245a976530b60245227620d916650c1e/raw/gluban_server.txt';
  var SPACE = 'https://shidailun-gluban-translate.hf.space';

  function show(stopped, text){
    document.getElementById('spinner').classList.toggle('hidden', stopped);
    document.getElementById('retry').classList.toggle('hidden', !stopped);
    document.getElementById('msg').textContent = text;
  }

  // Resolves true only if the host actually answers within `ms`. Uses no-cors so
  // we don't need CORS headers on the server; a torn-down tunnel rejects/aborts.
  function reachable(url, ms){
    return new Promise(function(resolve){
      var ctrl = new AbortController();
      var t = setTimeout(function(){ ctrl.abort(); }, ms);
      fetch(url.replace(/\/+$/,'') + '/status', { mode:'no-cors', cache:'no-store', signal: ctrl.signal })
        .then(function(){ clearTimeout(t); resolve(true); })
        .catch(function(){ clearTimeout(t); resolve(false); });
    });
  }

  async function go(){
    show(false, '正在尋找伺服器…');
    // 1) try the PC's current address from the gist
    var pc = null;
    try {
      var r = await fetch(GIST + '?_=' + Date.now(), { cache:'no-store' });
      if (r.ok) {
        var txt = (await r.text()).trim();
        if (/^https:\/\/\S+$/.test(txt)) pc = txt;
      }
    } catch (e) {}

    if (pc && await reachable(pc, 3500)) {
      show(false, '已連接電腦伺服器，正在開啟…');
      return location.replace(pc);
    }

    // 2) fall back to the always-on cloud Space (may be waking — give it longer)
    show(false, '電腦離線，改用雲端伺服器（可能需喚醒，請稍候）…');
    if (await reachable(SPACE, 12000)) {
      return location.replace(SPACE);
    }
    // 3) Space slow to wake — go anyway; it loads itself once awake
    show(false, '正在喚醒雲端伺服器…');
    location.replace(SPACE);
  }
  go();
</script>
</body>
</html>
